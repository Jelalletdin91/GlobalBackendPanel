<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Worker Kimlik Directory</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    :root{
        --soft-bg:#f6f7fb;
        --card-radius:16px;
        --shadow:0 10px 28px rgba(0,0,0,.08);
    }

    body{
        background:var(--soft-bg);
    }

    .page-title{
        font-weight:800;
        letter-spacing:.2px;
    }

    .card-shell{
        border:0;
        border-radius:var(--card-radius);
        box-shadow:var(--shadow);
        overflow:hidden;
    }

    .muted{
        color:#6c757d;
    }

    .badge-days{
        font-weight:700;
        padding:.45rem .65rem;
        border-radius:999px;
    }

    .key{
        font-size:.78rem;
        color:#6c757d;
    }

    .val{
        font-weight:600;
    }

    .btn-soft{
        border-radius:12px;
        padding:.55rem .9rem;
    }

    .truncate{
        max-width:100%;
        white-space:nowrap;
        overflow:hidden;
        text-overflow:ellipsis;
        display:block;
    }
  </style>
</head>

<body>
<div class="container py-4">

  <div class="d-flex align-items-center justify-content-between flex-wrap gap-2 mb-3">
    <div>
      <div class="text-muted small">Directory</div>
      <h2 class="page-title mb-0">Worker Kimlik</h2>
    </div>

    <a th:href="@{/VorkerKimlik/showForm}" class="btn btn-primary btn-sm px-3">
      + Add Worker
    </a>
  </div>

  <div class="row g-3">
    <div class="col-12 col-md-6 col-lg-4 col-xxl-3" th:each="v : ${vorkerKimliks}">
      <div class="card card-shell">
        <div class="card-body">

          <div class="d-flex justify-content-between align-items-start gap-2">
            <div class="flex-grow-1">
              <div class="fw-bold fs-5 truncate"
                   th:text="${v.firstName + ' ' + v.lastName}"
                   th:title="${v.firstName + ' ' + v.lastName}">
                Worker Name
              </div>

              <div class="muted small truncate"
                   th:text="${v.phoneNumber}"
                   th:title="${v.phoneNumber}">
                phone
              </div>
            </div>

            <span class="badge-days"
                  th:classappend="${v.daysLeft < 0} ? ' bg-danger text-white' : (${v.daysLeft <= 60} ? ' bg-warning text-dark' : ' bg-dark text-white')"
                  th:text="${v.daysLeft + ' d'}">
                            0 d
                        </span>
          </div>

          <hr class="my-3">

          <div class="mb-2">
            <div class="key">Email</div>
            <div class="val truncate"
                 th:text="${v.email}"
                 th:title="${v.email}">
              -
            </div>
          </div>

          <div class="mb-2">
            <div class="key">Kimlik Number</div>
            <div class="val truncate"
                 th:text="${v.kimlikNumber}"
                 th:title="${v.kimlikNumber}">
              -
            </div>
          </div>

          <div class="mb-2">
            <div class="key">Workplace</div>
            <div class="val truncate"
                 th:text="${v.workplace}"
                 th:title="${v.workplace}">
              -
            </div>
          </div>

          <div class="row g-2">
            <div class="col-6">
              <div class="key">Start</div>
              <div class="val" th:text="${v.kimlikStartDate}">-</div>
            </div>

            <div class="col-6 text-end">
              <div class="key">Expiry</div>
              <div class="val" th:text="${v.kimlikEndDate}">-</div>
            </div>
          </div>

          <div class="d-flex gap-2 mt-3">
            <a th:href="@{/VorkerKimlik/showVorkerKimlikForUpdate(vorkerKimlikId=${v.id})}"
               class="btn btn-outline-primary btn-soft btn-sm flex-fill">
              Update
            </a>

            <a th:href="@{/VorkerKimlik/delete(vorkerKimlikId=${v.id})}"
               class="btn btn-outline-danger btn-soft btn-sm flex-fill"
               onclick="return confirm('Are you sure you want to delete this worker?')">
              Delete
            </a>
          </div>

        </div>
      </div>
    </div>
  </div>

</div>
</body>
</html>
