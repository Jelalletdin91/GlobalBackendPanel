<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Kimlik Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f4f7fb;
            font-family: 'Segoe UI', sans-serif;
        }

        .container-box{
            background:#fff;
            border-radius:20px;
            padding:25px;
            box-shadow:0 10px 30px rgba(0,0,0,.08);
        }

        .topbar{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:20px;
        }

        .stats-card{
            border-radius:16px;
            padding:20px;
            background:#fff;
            box-shadow:0 6px 20px rgba(0,0,0,.06);
        }

        .stats-title{
            font-size:14px;
            color:#6c757d;
        }

        .stats-value{
            font-size:26px;
            font-weight:800;
        }

        .nav-card{
            border-radius:20px;
            padding:20px;
            background:#fff;
            box-shadow:0 8px 25px rgba(0,0,0,.07);
            transition:.2s;
            text-decoration:none;
            display:block;
            color:black;
        }

        .nav-card:hover{
            transform:translateY(-5px);
        }

        .activity-box{
            background:#fff;
            border-radius:20px;
            padding:20px;
            box-shadow:0 8px 25px rgba(0,0,0,.06);
        }

        .logout-btn{
            border-radius:12px;
        }

    </style>
</head>
<body>

<div class="container mt-5">
    <div class="container-box">

        <!-- TOP -->
        <div class="topbar">
            <div>
                <h3><b>Kimlik Dashboard</b></h3>
                <small>Welcome, <span sec:authentication="name"></span></small>
            </div>

            <form th:action="@{/logout}" method="post">
                <button class="btn btn-danger logout-btn">Logout</button>
            </form>
        </div>

        <!-- STATS -->
        <div class="row g-3 mb-4" sec:authorize="hasRole('Yonetici')">

            <div class="col-md-4">
                <div class="stats-card">
                    <div class="stats-title">Clients</div>
                    <div class="stats-value" th:text="${clientCount}">0</div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="stats-card">
                    <div class="stats-title">Students</div>
                    <div class="stats-value" th:text="${studentCount}">0</div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="stats-card">
                    <div class="stats-title">Workers</div>
                    <div class="stats-value" th:text="${workerCount}">0</div>
                </div>
            </div>

        </div>

        <!-- MODULES -->
        <div class="row g-4 mb-4">

            <div class="col-md-4" sec:authorize="hasRole('Kimlik')">
                <a th:href="@{/kimlik/list}" class="nav-card">
                    <h5>👤 Kimlik</h5>
                    <p>Manage client kimlik</p>
                </a>
            </div>

            <div class="col-md-4" sec:authorize="hasRole('StudentKimlik')">
                <a th:href="@{/Student_kimlik/list}" class="nav-card">
                    <h5>🎓 Student</h5>
                    <p>Manage students</p>
                </a>
            </div>

            <div class="col-md-4" sec:authorize="hasRole('VorkerKimlik')">
                <a th:href="@{/VorkerKimlik/list}" class="nav-card">
                    <h5>💼 Worker</h5>
                    <p>Manage workers</p>
                </a>
            </div>

        </div>

        <!-- ACTIVITY -->
        <div class="mt-4 p-4 bg-white rounded-4 shadow-sm" sec:authorize="hasRole('Yonetici')">
            <h4 class="fw-bold mb-3">Recent Activity</h4>

            <div th:if="${#lists.isEmpty(recentActivities)}" class="text-muted">
                No recent activity yet.
            </div>

            <ul class="mb-0 ps-3" th:if="${!#lists.isEmpty(recentActivities)}">
                <li th:each="a : ${recentActivities}" class="mb-2">
                    <span th:text="${a.description}">Activity text</span>
                    <span class="text-muted small"
                          th:text="${' - ' + #temporals.format(a.createdAt, 'dd.MM.yyyy HH:mm')}">
                time
            </span>
                </li>
            </ul>
            <a th:href="@{/RecentActivities}">More</a>
        </div>

    </div>
</div>

</body>
</html>
