<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Kimlik Form</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow col-md-8 mx-auto">
        <div class="card-header bg-primary text-white">
            <h4 class="mb-0">Kimlik Form</h4>
        </div>

        <div class="card-body">
            <!-- ERROR MESSAGE -->
            <div th:if="${errorMessage}" class="alert border-0 shadow rounded-3" style="background:#ffe5e5;">
                <div class="d-flex align-items-center">
                    <div style="font-size: 22px; margin-right:10px;">❌</div>
                    <div>
                        <div style="font-weight:600;">Duplicate Entry</div>
                        <div th:text="${errorMessage}"></div>
                    </div>
                </div>
            </div>
            <form th:action="@{/kimlik/save}" th:object="${kimlik}" method="POST">

                <input type="hidden" th:field="*{id}"/>

                <div class="row mb-3">
                    <div class="col">
                        <label class="form-label">First Name</label>
                        <input type="text" th:field="*{firstName}" class="form-control" required>
                    </div>
                    <div class="col">
                        <label class="form-label">Last Name</label>
                        <input type="text" th:field="*{lastName}" class="form-control" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" th:field="*{email}" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Phone Number</label>
                    <input type="text" th:field="*{phoneNumber}" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Kimlik Number</label>
                    <input type="text" th:field="*{kimlikNumber}" class="form-control" required>
                </div>

                <div class="row mb-3">
                    <div class="col">
                        <label class="form-label">Start Date</label>
                        <input type="date" th:field="*{kimlikStartDate}" class="form-control" required>
                    </div>
                    <div class="col">
                        <label class="form-label">End Date</label>
                        <input type="date" th:field="*{kimlikEndDate}" class="form-control" required>
                    </div>
                </div>

                <div class="d-flex justify-content-between">
                    <a th:href="@{/kimlik/list}" class="btn btn-secondary">⬅ Back</a>
                    <button type="submit" class="btn btn-primary">💾 Save</button>
                </div>

            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
