<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Worker Kimlik</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    :root{
      --soft-bg:#f6f7fb;
      --card-radius:16px;
      --shadow:0 10px 28px rgba(0,0,0,.08);
    }

    body{ background:var(--soft-bg); }

    .card-shell{
      border-radius:var(--card-radius);
      box-shadow:var(--shadow);
      background:#fff;
    }

    .muted{ color:#6c757d; }

    .badge-days{
      font-weight:700;
      padding:.45rem .65rem;
      border-radius:999px;
    }

    .key{ font-size:.78rem; color:#6c757d; }
    .val{ font-weight:600; }

    .btn-soft{
      border-radius:12px;
      padding:.55rem .9rem;
    }

    /* HEADER */
    .top-actions{
      display:flex;
      gap:10px;
    }

    .home-link-pro{
      display:flex;
      align-items:center;
      gap:8px;
      padding:9px 14px;
      border-radius:12px;
      background:#fff;
      border:1px solid #dee2e6;
      text-decoration:none;
      font-weight:600;
      transition:.2s;
    }

    .home-link-pro:hover{
      background:#0d6efd;
      color:#fff;
    }
  </style>
</head>

<body>
<div class="container py-4">

  <div class="d-flex justify-content-between mb-3">
    <div>
      <div class="text-muted small">Directory</div>
      <h2 class="fw-bold">Worker Kimlik</h2>
    </div>

    <div class="top-actions">
      <a th:href="@{/}" class="home-link-pro">🏠 Dashboard</a>

      <a th:href="@{/VorkerKimlik/showForm}" class="btn btn-primary">
        + Add Worker
      </a>
    </div>
  </div>

  <div class="row g-3">
    <div class="col-md-4" th:each="v : ${vorkerKimliks}">
      <div class="card card-shell">
        <div class="card-body">

          <div class="d-flex justify-content-between">
            <div>
              <div class="fw-bold"
                   th:text="${v.firstName + ' ' + v.lastName}"></div>

              <div class="muted small" th:text="${v.phoneNumber}"></div>
            </div>

            <span class="badge-days"
                  th:classappend="${v.daysLeft < 0} ? ' bg-danger text-white' : (${v.daysLeft <= 60} ? ' bg-warning' : ' bg-dark text-white')"
                  th:text="${v.daysLeft + ' d'}"></span>
          </div>

          <hr>

          <div class="key">Email</div>
          <div class="val" th:text="${v.email}"></div>

          <div class="key mt-2">Kimlik</div>
          <div class="val" th:text="${v.kimlikNumber}"></div>

          <div class="key mt-2">Workplace</div>
          <div class="val" th:text="${v.workplace}"></div>

          <div class="row mt-2">
            <div class="col-6">
              <div class="key">Start</div>
              <div class="val" th:text="${v.kimlikStartDate}"></div>
            </div>

            <div class="col-6 text-end">
              <div class="key">End</div>
              <div class="val" th:text="${v.kimlikEndDate}"></div>
            </div>
          </div>

          <div class="d-flex gap-2 mt-3">
            <a th:href="@{/VorkerKimlik/showVorkerKimlikForUpdate(vorkerKimlikId=${v.id})}"
               class="btn btn-outline-primary btn-soft flex-fill">
              Update
            </a>

            <a th:href="@{/VorkerKimlik/delete(vorkerKimlikId=${v.id})}"
               class="btn btn-outline-danger btn-soft flex-fill">
              Delete
            </a>
          </div>

        </div>
      </div>
    </div>
  </div>

</div>
</body>
</html>
