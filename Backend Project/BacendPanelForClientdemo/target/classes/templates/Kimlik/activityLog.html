<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Activity Log</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root{
            --soft-bg:#f6f7fb;
            --card-radius:18px;
            --shadow:0 12px 30px rgba(0,0,0,.08);
        }

        body{
            background:var(--soft-bg);
        }

        .page-title{
            font-weight:800;
            letter-spacing:.2px;
        }

        .card-shell{
            border:0;
            border-radius:var(--card-radius);
            box-shadow:var(--shadow);
            background:#fff;
        }

        .top-actions{
            display:flex;
            align-items:center;
            gap:10px;
            flex-wrap:wrap;
        }

        .home-link-pro{
            display:inline-flex;
            align-items:center;
            gap:8px;
            padding:9px 14px;
            border-radius:12px;
            background:#ffffff;
            border:1px solid #dee2e6;
            color:#212529;
            text-decoration:none;
            font-weight:600;
            box-shadow:0 4px 12px rgba(0,0,0,.04);
            transition:all .22s ease;
        }

        .home-link-pro:hover{
            background:#0d6efd;
            border-color:#0d6efd;
            color:#fff;
            transform:translateY(-1px);
        }

        .icon{
            font-size:16px;
            line-height:1;
        }

        .table-wrap{
            border-radius:16px;
            overflow:hidden;
        }

        .table thead th{
            font-size:.9rem;
            font-weight:700;
            color:#495057;
            background:#f8f9fa;
            border-bottom:1px solid #e9ecef;
            white-space:nowrap;
        }

        .table tbody td{
            vertical-align:middle;
            padding:1rem .85rem;
        }

        .badge-soft{
            padding:.5rem .75rem;
            border-radius:999px;
            font-weight:700;
            font-size:.78rem;
        }

        .type-create{
            background:#eaf8ee;
            color:#198754;
        }

        .type-update{
            background:#fff3cd;
            color:#8a6d3b;
        }

        .type-delete{
            background:#f8d7da;
            color:#b02a37;
        }

        .type-other{
            background:#e9ecef;
            color:#495057;
        }

        .entity-badge{
            background:#eef3ff;
            color:#0d6efd;
            padding:.45rem .7rem;
            border-radius:999px;
            font-size:.78rem;
            font-weight:700;
        }

        .empty-box{
            text-align:center;
            padding:3rem 1rem;
            color:#6c757d;
        }

        .muted-small{
            color:#6c757d;
            font-size:.88rem;
        }
    </style>
</head>
<body>

<div class="container py-4">

    <div class="d-flex align-items-center justify-content-between flex-wrap gap-2 mb-3">
        <div>
            <div class="text-muted small">System</div>
            <h2 class="page-title mb-0">Activity Log</h2>
            <div class="muted-small mt-1">View all recent activities in the dashboard.</div>
        </div>

        <div class="top-actions">
            <a th:href="@{/}" class="home-link-pro">
                <span class="icon">🏠</span>
                <span>Dashboard</span>
            </a>
        </div>
    </div>

    <div class="card card-shell">
        <div class="card-body p-0">

            <div th:if="${#lists.isEmpty(activityLogs)}" class="empty-box">
                <h5 class="mb-2">No activity found</h5>
                <p class="mb-0">There are no logs to display yet.</p>
            </div>

            <div th:if="${!#lists.isEmpty(activityLogs)}" class="table-responsive table-wrap">
                <table class="table table-hover align-middle mb-0">
                    <thead>
                    <tr>
                        <th>#</th>
                        <th>Action</th>
                        <th>Entity Type</th>
                        <th>Name</th>
                        <th>Description</th>
                        <th>Date & Time</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="log, stat : ${activityLogs}">
                        <td th:text="${stat.count}">1</td>

                        <td>
                            <span class="badge-soft"
                                  th:classappend="${log.actionType == 'Created' or log.actionType == 'CREATE'} ? ' type-create' :
                                                  (${log.actionType == 'Updated' or log.actionType == 'UPDATE'} ? ' type-update' :
                                                  (${log.actionType == 'Deleted' or log.actionType == 'DELETE'} ? ' type-delete' : ' type-other'))"
                                  th:text="${log.actionType}">
                                Action
                            </span>
                        </td>

                        <td>
                            <span class="entity-badge" th:text="${log.entityType}">Entity</span>
                        </td>

                        <td th:text="${log.entityName}">Name</td>

                        <td th:text="${log.description}">Description</td>

                        <td th:text="${#temporals.format(log.createdAt, 'dd.MM.yyyy HH:mm')}">
                            27.03.2026 09:06
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

        </div>
    </div>

</div>

</body>
</html>
