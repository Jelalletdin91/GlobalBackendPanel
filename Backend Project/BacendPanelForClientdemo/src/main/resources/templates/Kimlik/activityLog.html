<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Activity Log | Kimlik OS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --accent: #6366f1;
            --body-bg: #f9fafb;
            --card-border: rgba(229, 231, 235, 0.8);
        }

        body {
            background-color: var(--body-bg);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: #111827;
            margin: 0;
        }

        .container {
            max-width: 1100px;
        }

        /* HEADER */
        .page-header {
            padding: 40px 0 30px;
        }

        /* TABLE CARD */
        .pro-card {
            background: #ffffff;
            border: 1px solid var(--card-border);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
        }

        .table thead th {
            background: #f8fafc;
            color: #64748b;
            font-weight: 700;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 18px 24px;
            border-bottom: 1px solid #e2e8f0;
        }

        .table tbody td {
            padding: 16px 24px;
            vertical-align: middle;
            border-bottom: 1px solid #f1f5f9;
            font-size: 14px;
        }

        /* BADGES */
        .badge-soft { padding: 6px 12px; border-radius: 8px; font-weight: 700; font-size: 11px; }
        .type-create { background: #dcfce7; color: #166534; }
        .type-update { background: #fef9c3; color: #854d0e; }
        .type-delete { background: #fee2e2; color: #991b1b; }
        .type-other { background: #f1f5f9; color: #475569; }

        .entity-label {
            background: #eef2ff;
            color: #4338ca;
            padding: 4px 10px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 12px;
        }

        .btn-back {
            background: white;
            border: 1px solid #e2e8f0;
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: 600;
            color: #64748b;
            text-decoration: none;
            transition: 0.2s;
        }

        .btn-back:hover {
            background: #f8fafc;
            color: var(--accent);
            border-color: var(--accent);
        }

        @media (max-width: 768px) {
            .page-header { text-align: center; }
            .d-flex-mobile { flex-direction: column; gap: 15px; align-items: center !important; }
        }
    </style>
</head>
<body>

<div class="container">
    <header class="page-header d-flex justify-content-between align-items-center d-flex-mobile">
        <div>
            <div class="text-primary fw-bold small text-uppercase mb-1" style="letter-spacing: 1px;">System Audit</div>
            <h1 class="fw-800 m-0" style="font-size: 2rem;">Activity Log</h1>
        </div>
        <a th:href="@{/}" class="btn-back">
            <i class="fa-solid fa-house me-2"></i> Dashboard
        </a>
    </header>

    <div class="pro-card mb-5">
        <div th:if="${#lists.isEmpty(activityLogs)}" class="p-5 text-center">
            <i class="fa-solid fa-clock-rotate-left fs-1 text-muted opacity-25 mb-3"></i>
            <h5 class="text-muted">No activities found</h5>
            <p class="small text-muted">System events will appear here once they occur.</p>
        </div>

        <div th:if="${!#lists.isEmpty(activityLogs)}" class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead>
                <tr>
                    <th class="ps-4">Action</th>
                    <th>Resource</th>
                    <th>Target Name</th>
                    <th>Description</th>
                    <th class="pe-4 text-end">Timestamp</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="log : ${activityLogs}">
                    <td class="ps-4">
                            <span class="badge-soft"
                                  th:classappend="${log.actionType == 'Created' or log.actionType == 'CREATE'} ? ' type-create' :
                                                  (${log.actionType == 'Updated' or log.actionType == 'UPDATE'} ? ' type-update' :
                                                  (${log.actionType == 'Deleted' or log.actionType == 'DELETE'} ? ' type-delete' : ' type-other'))"
                                  th:text="${log.actionType}">
                                ACTION
                            </span>
                    </td>
                    <td>
                        <span class="entity-label" th:text="${log.entityType}">Entity</span>
                    </td>
                    <td class="fw-600" th:text="${log.entityName}">Name</td>
                    <td class="text-muted small" th:text="${log.description}">Description</td>
                    <td class="pe-4 text-end">
                        <div class="fw-bold" th:text="${#temporals.format(log.createdAt, 'dd.MM.yyyy')}">15.04.2026</div>
                        <div class="text-muted small" th:text="${#temporals.format(log.createdAt, 'HH:mm:ss')}">15:36:33</div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
