<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Portal | Create Company</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: #f4e8de; /* Soft warm background like the image */
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .main-container {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.08);
        }
        .blue-panel {
            background: #3b44f6; /* Vibrant Royal Blue */
            position: relative;
            overflow: hidden;
        }
        /* Glass spheres in background */
        .sphere {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
        }
        .input-pill {
            background: white;
            border: 1.5px solid #d1d5db;
            transition: all 0.2s ease;
        }
        .input-pill:focus {
            border-color: #3b44f6;
            outline: none;
            box-shadow: 0 0 0 4px rgba(59, 68, 246, 0.1);
        }
        .avatar-glow {
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.4);
        }
    </style>
</head>
<body class="p-4">

<div class="max-w-5xl w-full grid grid-cols-1 md:grid-cols-2 main-container rounded-[3rem] overflow-hidden">

    <div class="blue-panel p-12 text-white flex flex-col items-center text-center justify-center space-y-8">
        <div class="sphere w-32 h-32 -top-10 -left-10"></div>
        <div class="sphere w-20 h-20 bottom-10 right-10"></div>

        <div class="w-20 h-20 bg-white/20 backdrop-blur-xl rounded-3xl flex items-center justify-center shadow-2xl border border-white/30">
            <svg class="w-10 h-10 text-white" fill="currentColor" viewBox="0 0 24 24">
                <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path>
            </svg>
        </div>

        <div class="space-y-4">
            <h1 class="text-4xl font-bold tracking-tight">Grow Your Business Faster.</h1>
            <p class="text-blue-100 text-lg font-light leading-relaxed max-w-sm mx-auto">
                Join 2,000+ companies managing their operations with our enterprise-grade infrastructure.
            </p>
        </div>

        <div class="flex justify-center -space-x-4">
            <img class="w-24 h-24 rounded-full border-4 border-white/30 avatar-glow bg-gray-100" src="https://i.ibb.co/hR0V6X8/man1.png" alt="Executive 1">
            <img class="w-24 h-24 rounded-full border-4 border-white/30 avatar-glow bg-gray-100" src="https://i.ibb.co/L6vV9r8/man2.png" alt="Executive 2">
            <img class="w-24 h-24 rounded-full border-4 border-white/30 avatar-glow bg-gray-100" src="https://i.ibb.co/vYm6zV5/man3.png" alt="Executive 3">
        </div>

        <p class="text-blue-50 italic text-sm max-w-xs">
            "The best decision we made for our team scaling this year."
        </p>
    </div>

    <div class="p-12 md:p-16 flex flex-col justify-center bg-white/30">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-bold text-gray-900">Create Company</h2>
            <p class="text-gray-500 mt-2">Fill in the details to launch your portal.</p>
        </div>

        <div th:if="${errorMessage}" class="mb-6 p-4 rounded-2xl bg-red-50 text-red-600 text-sm border border-red-100 text-center">
            <span th:text="${errorMessage}"></span>
        </div>

        <form th:action="@{/company/register}" method="post" class="space-y-4">
            <input type="text" name="companyName" placeholder="Company Identity" required
                   class="w-full px-6 py-3 rounded-full input-pill text-gray-700">

            <input type="text" name="ownerName" placeholder="Founder Name" required
                   class="w-full px-6 py-3 rounded-full input-pill text-gray-700">

            <input type="email" name="email" placeholder="Corporate Email" required
                   class="w-full px-6 py-3 rounded-full input-pill text-gray-700">

            <input type="text" name="username" placeholder="Username" required
                   class="w-full px-6 py-3 rounded-full input-pill text-gray-700">

            <input type="password" name="password" placeholder="Secure Password" required
                   class="w-full px-6 py-3 rounded-full input-pill text-gray-700">

            <div class="relative">
                <select name="subscriptionPlan" class="w-full px-6 py-3 rounded-full input-pill text-gray-500 appearance-none cursor-pointer">
                    <option value="MONTHLY">MONTHLY / YEARLY (Save 20%)</option>
                    <option value="YEARLY">Yearly Plan</option>
                </select>
                <div class="absolute right-5 top-4 pointer-events-none text-gray-400">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                </div>
            </div>

            <input type="number" name="invitedByUserId" placeholder="Invite Code"
                   class="w-full px-6 py-3 rounded-full input-pill text-gray-700">

            <button type="submit"
                    class="w-full bg-[#3b44f6] hover:bg-blue-700 text-white font-bold py-4 rounded-full shadow-lg shadow-blue-200 transition-all transform active:scale-[0.98] mt-4 tracking-wider uppercase">
                Get Started Now
            </button>
        </form>

        <p class="text-center text-[10px] text-gray-400 mt-8 font-bold uppercase tracking-widest">
            SECURE 256-BIT SSL ENCRYPTED CONNECTION
        </p>
    </div>
</div>

</body>
</html>
