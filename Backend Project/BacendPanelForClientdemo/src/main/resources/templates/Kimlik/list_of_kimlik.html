<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Client Identity Directory</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    .border-danger-left {
      border-left: 5px solid #dc3545;
    }

    .border-warning-left {
      border-left: 5px solid #ffc107;
    }
  </style>

</head>

<body>

<div class="container mt-4">

  <h3>Client Identity Directory</h3>
  <hr>

  <a th:href="@{/kimlik/showForm}" class="btn btn-primary btn-sm mb-3">
    Add Client
  </a>

  <table class="table table-bordered table-striped">
    <thead class="table-dark">
    <tr>
      <th>First Name</th>
      <th>Last Name</th>
      <th>Phone Number</th>
      <th>T.C. Number</th>
      <th>T.C. Start Date</th>
      <th>T.C. Expiry Date</th>
      <th>Days Left</th>
      <th>Actions</th>

    </tr>
    </thead>

    <tbody>
    <tr th:each="k : ${kimliks}">
      <td th:text="${k.firstName}"></td>
      <td th:text="${k.lastName}"></td>
      <td th:text="${k.phoneNumber}"></td>
      <td th:text="${k.kimlikNumber}"></td>
      <td th:text="${k.kimlikStartDate}"></td>
      <td th:text="${k.kimlikEndDate}"></td>
      <td th:text="${k.daysLeft}"></td>

      <td>
        <a th:href="@{/kimlik/showFormForUpdate(kimlikId=${k.id})}"
           class="btn btn-info btn-sm">
          Update
        </a>

        <a th:href="@{/kimlik/delete(kimlikId=${k.id})}"
           class="btn btn-danger btn-sm"
           onclick="return confirm('Are you sure you want to delete this client?')">
          Delete
        </a>
      </td>
    </tr>
    </tbody>

  </table>

</div>

</body>
</html>
