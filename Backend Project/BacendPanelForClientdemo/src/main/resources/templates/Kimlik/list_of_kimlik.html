<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Client Identity</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    :root{
      --soft-bg:#f6f7fb;
      --card-radius:16px;
      --shadow: 0 10px 28px rgba(0,0,0,.08);
    }

    body{
      background:var(--soft-bg);
    }

    .page-title{
      font-weight:800;
      letter-spacing:.2px;
    }

    .card-shell{
      border:0;
      border-radius:var(--card-radius);
      box-shadow: var(--shadow);
      overflow:hidden;
      background: #fff;
    }

    .muted{
      color:#6c757d;
    }

    .badge-days{
      font-weight:700;
      padding:.45rem .65rem;
      border-radius:999px;
    }

    .key{
      font-size:.78rem;
      color:#6c757d;
    }

    .val{
      font-weight:600;
    }

    .btn-soft{
      border-radius:12px;
      padding:.55rem .9rem;
    }

    .truncate{
      max-width: 100%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display:block;
    }

    .top-actions{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .home-link-pro{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:9px 14px;
      border-radius:12px;
      background:#ffffff;
      border:1px solid #dee2e6;
      color:#212529;
      text-decoration:none;
      font-weight:600;
      box-shadow: 0 4px 12px rgba(0,0,0,.04);
      transition: all .22s ease;
    }

    .home-link-pro:hover{
      background:#0d6efd;
      border-color:#0d6efd;
      color:#fff;
      transform: translateY(-1px);
    }

    .home-link-pro .icon{
      font-size:16px;
      line-height:1;
    }

    .add-btn{
      border-radius:12px;
      padding:9px 16px;
      font-weight:600;
      box-shadow: 0 6px 16px rgba(13,110,253,.18);
    }
  </style>
</head>

<body>
<div class="container py-4">

  <div class="d-flex align-items-center justify-content-between flex-wrap gap-2 mb-3">
    <div>
      <div class="text-muted small">Directory</div>
      <h2 class="page-title mb-0">Client Identity</h2>
    </div>

    <div class="top-actions">
      <a th:href="@{/}" class="home-link-pro">
        <span class="icon">🏠</span>
        <span>Dashboard</span>
      </a>

      <a th:href="@{/kimlik/showForm}" class="btn btn-primary add-btn">
        + Add Client
      </a>
    </div>
  </div>

  <div class="row g-3">
    <div class="col-12 col-md-6 col-lg-4 col-xxl-3" th:each="k : ${kimliks}">
      <div class="card card-shell">
        <div class="card-body">

          <div class="d-flex justify-content-between align-items-start gap-2">
            <div class="flex-grow-1">
              <div class="fw-bold fs-5 truncate"
                   th:text="${k.firstName + ' ' + k.lastName}"
                   th:title="${k.firstName + ' ' + k.lastName}">
                Name
              </div>
              <div class="muted small truncate" th:text="${k.phoneNumber}" th:title="${k.phoneNumber}">
                phone
              </div>
            </div>

            <span class="badge-days"
                  th:classappend="${k.daysLeft < 0} ? ' bg-danger text-white' : (${k.daysLeft <= 60} ? ' bg-warning text-dark' : ' bg-dark text-white')"
                  th:text="${k.daysLeft + ' d'}">
              0 d
            </span>
          </div>

          <hr class="my-3">

          <div class="mb-2">
            <div class="key">T.C. Number</div>
            <div class="val truncate" th:text="${k.kimlikNumber}" th:title="${k.kimlikNumber}">-</div>
          </div>

          <div class="row g-2">
            <div class="col-6">
              <div class="key">Start</div>
              <div class="val" th:text="${k.kimlikStartDate}">-</div>
            </div>
            <div class="col-6 text-end">
              <div class="key">Expiry</div>
              <div class="val" th:text="${k.kimlikEndDate}">-</div>
            </div>
          </div>

          <div class="d-flex gap-2 mt-3">
            <a th:href="@{/kimlik/showFormForUpdate(kimlikId=${k.id})}"
               class="btn btn-outline-primary btn-soft btn-sm flex-fill">
              Update
            </a>

            <a th:href="@{/kimlik/delete(kimlikId=${k.id})}"
               class="btn btn-outline-danger btn-soft btn-sm flex-fill"
               onclick="return confirm('Are you sure you want to delete this client?')">
              Delete
            </a>
          </div>

        </div>
      </div>
    </div>
  </div>

</div>
</body>
</html>
