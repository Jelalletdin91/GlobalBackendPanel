<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login | Yashka</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top, #0f172a, #020617);
            color: white;
        }

        .container {
            width: 100%;
            max-width: 420px;
            padding: 30px;
        }

        .card {
            background: rgba(255,255,255,0.04);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 40px 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }

        .logo {
            text-align: center;
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 5px;
            background: linear-gradient(135deg, #3b82f6, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            text-align: center;
            font-size: 13px;
            color: rgba(255,255,255,0.5);
            margin-bottom: 25px;
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            font-weight: 700;
        }

        .alert {
            padding: 12px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 15px;
        }

        .error {
            background: rgba(248,113,113,0.1);
            border: 1px solid rgba(248,113,113,0.3);
            color: #f87171;
        }

        .success {
            background: rgba(34,197,94,0.1);
            border: 1px solid rgba(34,197,94,0.3);
            color: #22c55e;
        }

        .field {
            margin-bottom: 15px;
        }

        .field label {
            font-size: 12px;
            margin-bottom: 5px;
            display: block;
            color: rgba(255,255,255,0.6);
        }

        .field input {
            width: 100%;
            height: 45px;
            padding: 0 12px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
            color: white;
            outline: none;
            transition: 0.2s;
        }

        .field input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59,130,246,0.2);
        }

        .btn {
            width: 100%;
            height: 48px;
            margin-top: 10px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 30px rgba(59,130,246,0.4);
        }

        .footer {
            text-align: center;
            margin-top: 18px;
            font-size: 13px;
            color: rgba(255,255,255,0.5);
        }

        .footer a {
            color: #3b82f6;
            text-decoration: none;
            font-weight: 600;
        }

        .footer a:hover {
            text-decoration: underline;
        }

    </style>
</head>

<body>

<div class="container">
    <div class="card">

        <div class="logo">Yashka</div>
        <div class="subtitle">Secure Admin Panel</div>

        <h2>Sign in</h2>

        <!-- Error -->
        <div th:if="${param.error}" class="alert error">
            Wrong username or password
        </div>

        <!-- Logout -->
        <div th:if="${param.logout}" class="alert success">
            Logged out successfully
        </div>

        <form th:action="@{/authenticateTheUser}" method="POST">

            <div class="field">
                <label>Username</label>
                <input type="text" name="username" placeholder="Enter username" required>
            </div>

            <div class="field">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter password" required>
            </div>

            <button type="submit" class="btn">
                Login →
            </button>

        </form>

        <div class="footer">
            Don’t have an account?
            <a th:href="@{/company/register}">Create one</a>
        </div>

    </div>
</div>

</body>
</html>
