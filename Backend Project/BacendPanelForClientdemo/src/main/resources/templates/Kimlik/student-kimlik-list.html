<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Student Kimlik</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root{
          --soft-bg:#f6f7fb;
          --card-radius:16px;
          --shadow: 0 10px 28px rgba(0,0,0,.08);
        }
        body{ background:var(--soft-bg); }

        .page-title{ font-weight:800; letter-spacing:.2px; }
        .card-shell{
          border:0; border-radius:var(--card-radius);
          box-shadow: var(--shadow);
          overflow:hidden;
        }
        .muted{ color:#6c757d; }
        .badge-days{
          font-weight:700;
          padding:.45rem .65rem;
          border-radius:999px;
        }

        .key{ font-size:.78rem; color:#6c757d; }
        .val{ font-weight:600; }

        .btn-soft{
          border-radius:12px;
          padding:.55rem .9rem;
        }

        .truncate{
          max-width: 100%;
          white-space: nowrap;
          overflow: hidden;
          text-overflow: ellipsis;
          display:block;
        }
    </style>
</head>

<body>
<div class="container py-4">

    <div class="d-flex align-items-center justify-content-between flex-wrap gap-2 mb-3">
        <div>
            <div class="text-muted small">Directory</div>
            <h2 class="page-title mb-0">Student Kimlik</h2>
        </div>

        <a th:href="@{/Student_kimlik/showForm}" class="btn btn-primary btn-sm px-3">
            + Add Student
        </a>
    </div>

    <!-- ✅ GRID для всех экранов -->
    <div class="row g-3">
        <div class="col-12 col-md-6 col-lg-4 col-xxl-3" th:each="s : ${studentKimliks}">
            <div class="card card-shell">
                <div class="card-body">

                    <!-- top row -->
                    <div class="d-flex justify-content-between align-items-start gap-2">
                        <div class="flex-grow-1">
                            <div class="fw-bold fs-5 truncate"
                                 th:text="${s.firstName + ' ' + s.lastName}"
                                 th:title="${s.firstName + ' ' + s.lastName}">
                                Name
                            </div>
                            <div class="muted small truncate" th:text="${s.phoneNumber}" th:title="${s.phoneNumber}">
                                phone
                            </div>
                            <div class="muted small truncate" th:text="${s.email}" th:title="${s.email}">
                                email
                            </div>
                        </div>

                        <!-- days badge -->
                        <span class="badge-days"
                              th:classappend="${s.daysLeft < 0} ? ' bg-danger text-white' : (${s.daysLeft <= 60} ? ' bg-warning text-dark' : ' bg-dark text-white')"
                              th:text="${s.daysLeft + ' d'}">
              0 d
            </span>
                    </div>

                    <hr class="my-3">

                    <!-- Kimlik info -->
                    <div class="mb-2">
                        <div class="key">Kimlik Number</div>
                        <div class="val truncate" th:text="${s.kimlikNumber}" th:title="${s.kimlikNumber}">-</div>
                    </div>

                    <div class="row g-2 mb-2">
                        <div class="col-6">
                            <div class="key">Kimlik Start</div>
                            <div class="val" th:text="${s.kimlikStartDate}">-</div>
                        </div>
                        <div class="col-6 text-end">
                            <div class="key">Kimlik Expiry</div>
                            <div class="val" th:text="${s.kimlikEndDate}">-</div>
                        </div>
                    </div>

                    <hr class="my-3">

                    <!-- University info -->
                    <div class="row g-2">
                        <div class="col-6">
                            <div class="key">University</div>
                            <div class="val truncate" th:text="${s.university}" th:title="${s.university}">-</div>
                        </div>
                        <div class="col-6 text-end">
                            <div class="key">Department</div>
                            <div class="val truncate" th:text="${s.department}" th:title="${s.department}">-</div>
                        </div>
                    </div>

                    <div class="row g-2 mt-2">
                        <div class="col-6">
                            <div class="key">Study Begin</div>
                            <div class="val" th:text="${s.universityStartDate}">-</div>
                        </div>
                        <div class="col-6 text-end">
                            <div class="key">Study End</div>
                            <div class="val" th:text="${s.universityEndDate}">-</div>
                        </div>
                    </div>

                    <!-- actions -->
                    <div class="d-flex gap-2 mt-3">
                        <a th:href="@{/Student_kimlik/showStudentKimlikForUpdate(studentKimlikId=${s.id})}"
                           class="btn btn-outline-primary btn-soft btn-sm flex-fill">
                            Update
                        </a>

                        <a th:href="@{/Student_kimlik/delete(studentKimlikId=${s.id})}"
                           class="btn btn-outline-danger btn-soft btn-sm flex-fill"
                           onclick="return confirm('Are you sure you want to delete this student?')">
                            Delete
                        </a>
                    </div>

                </div>
            </div>
        </div>
    </div>

</div>
</body>
</html>
