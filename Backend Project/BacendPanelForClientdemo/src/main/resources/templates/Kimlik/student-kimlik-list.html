<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Student Kimlik</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root{
            --soft-bg:#f6f7fb;
            --card-radius:16px;
            --shadow:0 10px 28px rgba(0,0,0,.08);
        }

        body{ background:var(--soft-bg); }

        .page-title{ font-weight:800; }

        .card-shell{
            border:0;
            border-radius:var(--card-radius);
            box-shadow:var(--shadow);
            background:#fff;
        }

        .muted{ color:#6c757d; }

        .badge-days{
            font-weight:700;
            padding:.45rem .65rem;
            border-radius:999px;
        }

        .key{ font-size:.78rem; color:#6c757d; }
        .val{ font-weight:600; }

        .btn-soft{
            border-radius:12px;
            padding:.55rem .9rem;
        }

        .truncate{
            white-space:nowrap;
            overflow:hidden;
            text-overflow:ellipsis;
            display:block;
        }

        /* PRO HEADER */
        .top-actions{
            display:flex;
            gap:10px;
            flex-wrap:wrap;
        }

        .home-link-pro{
            display:flex;
            align-items:center;
            gap:8px;
            padding:9px 14px;
            border-radius:12px;
            background:#fff;
            border:1px solid #dee2e6;
            text-decoration:none;
            font-weight:600;
            transition:.2s;
        }

        .home-link-pro:hover{
            background:#0d6efd;
            color:#fff;
        }

        .add-btn{
            border-radius:12px;
            padding:9px 16px;
            font-weight:600;
        }
    </style>
</head>

<body>
<div class="container py-4">

    <div class="d-flex justify-content-between mb-3">
        <div>
            <div class="text-muted small">Directory</div>
            <h2 class="page-title">Student Kimlik</h2>
        </div>

        <div class="top-actions">
            <a th:href="@{/}" class="home-link-pro">
                🏠 Dashboard
            </a>

            <a th:href="@{/Student_kimlik/showForm}" class="btn btn-primary add-btn">
                + Add Student
            </a>
        </div>
    </div>

    <div class="row g-3">
        <div class="col-md-4" th:each="s : ${studentKimliks}">
            <div class="card card-shell">
                <div class="card-body">

                    <div class="d-flex justify-content-between">
                        <div>
                            <div class="fw-bold"
                                 th:text="${s.firstName + ' ' + s.lastName}"></div>

                            <div class="muted small" th:text="${s.phoneNumber}"></div>
                            <div class="muted small" th:text="${s.email}"></div>
                        </div>

                        <span class="badge-days"
                              th:classappend="${s.daysLeft < 0} ? ' bg-danger text-white' : (${s.daysLeft <= 60} ? ' bg-warning' : ' bg-dark text-white')"
                              th:text="${s.daysLeft + ' d'}"></span>
                    </div>

                    <hr>

                    <div class="key">Kimlik</div>
                    <div class="val" th:text="${s.kimlikNumber}"></div>

                    <div class="row mt-2">
                        <div class="col-6">
                            <div class="key">Start</div>
                            <div class="val" th:text="${s.kimlikStartDate}"></div>
                        </div>
                        <div class="col-6 text-end">
                            <div class="key">End</div>
                            <div class="val" th:text="${s.kimlikEndDate}"></div>
                        </div>
                    </div>

                    <hr>

                    <div class="key">University</div>
                    <div class="val" th:text="${s.university}"></div>

                    <div class="key mt-2">Department</div>
                    <div class="val" th:text="${s.department}"></div>

                    <div class="d-flex gap-2 mt-3">
                        <a th:href="@{/Student_kimlik/showStudentKimlikForUpdate(studentKimlikId=${s.id})}"
                           class="btn btn-outline-primary btn-soft flex-fill">
                            Update
                        </a>

                        <a th:href="@{/Student_kimlik/delete(studentKimlikId=${s.id})}"
                           class="btn btn-outline-danger btn-soft flex-fill">
                            Delete
                        </a>
                    </div>

                </div>
            </div>
        </div>
    </div>

</div>
</body>
</html>
