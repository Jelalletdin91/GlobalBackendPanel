<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Employee Management</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body{
            background:#f6f8fc;
        }
        .page-card{
            background:#fff;
            border:none;
            border-radius:22px;
            box-shadow:0 10px 30px rgba(0,0,0,.08);
        }
        .page-title{
            font-weight:800;
        }
        .top-actions{
            display:flex;
            gap:10px;
            flex-wrap:wrap;
        }
        .btn-pro{
            border-radius:12px;
            padding:10px 16px;
            font-weight:600;
        }
        .table thead th{
            font-weight:700;
        }
    </style>
</head>
<body>
<div class="container py-4">
    <div class="page-card p-4">
        <div class="d-flex justify-content-between align-items-center flex-wrap gap-3 mb-4">
            <div>
                <div class="text-muted small">Management</div>
                <h2 class="page-title mb-0">Employees</h2>
            </div>

            <div class="top-actions">
                <a th:href="@{/}" class="btn btn-outline-secondary btn-pro">Dashboard</a>
                <a th:href="@{/employee/showForm}" class="btn btn-success btn-pro">+ Add Employee</a>
            </div>
        </div>

        <div class="table-responsive">
            <table class="table align-middle">
                <thead>
                <tr>
                    <th>Name</th>
                    <th>Username</th>
                    <th>Enabled</th>
                    <th>Roles</th>
                    <th class="text-end">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="e : ${employees}">
                    <td th:text="${e.name}">Name</td>
                    <td th:text="${e.username}">Username</td>
                    <td>
                        <span th:text="${e.enabled ? 'Active' : 'Disabled'}">Active</span>
                    </td>
                    <td>
                        <span th:each="r : ${e.roles}" class="badge bg-light text-dark me-1 mb-1" th:text="${r.name}">Role</span>
                    </td>
                    <td class="text-end">
    <span th:if="${e.roles.?[name == 'YONETICI'].size() > 0}">
        Protected
    </span>

                        <span th:if="${e.roles.?[name == 'YONETICI'].size() == 0}">
        <a th:href="@{/employee/showFormForUpdate(employeeId=${e.id})}"
           class="btn btn-sm btn-outline-primary">Update</a>

        <a th:href="@{/employee/delete(employeeId=${e.id})}"
           class="btn btn-sm btn-outline-danger"
           onclick="return confirm('Are you sure?')">Delete</a>
    </span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
