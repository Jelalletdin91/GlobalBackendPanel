<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Employee Form</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body{
            background:#f6f8fc;
        }
        .form-card{
            background:#fff;
            border:none;
            border-radius:22px;
            box-shadow:0 10px 30px rgba(0,0,0,.08);
        }
        .page-title{
            font-weight:800;
        }
        .btn-pro{
            border-radius:12px;
            padding:10px 16px;
            font-weight:600;
        }
    </style>
</head>
<body>
<div class="container py-5">
    <div class="col-12 col-lg-8 mx-auto">
        <div class="form-card p-4">
            <div class="mb-4">
                <div class="text-muted small">Management</div>
                <h2 class="page-title mb-0">Employee Form</h2>
            </div>

            <div th:if="${errorMessage}" class="alert alert-danger rounded-4" th:text="${errorMessage}">
                Error message
            </div>

            <form th:action="@{/employee/save}" th:object="${employee}" method="post">
                <input type="hidden" th:field="*{id}"/>

                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text" th:field="*{name}" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" th:field="*{username}" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="text" th:field="*{password}" class="form-control"
                           placeholder="Enter password for new employee or new password for update">
                </div>

                <div class="mb-3">
                    <label class="form-label">Roles</label>

                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" name="kimlikRole" id="kimlikRole"
                               th:checked="${kimlikRole}">
                        <label class="form-check-label" for="kimlikRole">Kimlik</label>
                    </div>

                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" name="studentRole" id="studentRole"
                               th:checked="${studentRole}">
                        <label class="form-check-label" for="studentRole">Student Kimlik</label>
                    </div>

                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" name="workerRole" id="workerRole"
                               th:checked="${workerRole}">
                        <label class="form-check-label" for="workerRole">Worker Kimlik</label>
                    </div>
                </div>

                <div class="d-flex gap-2">
                    <a th:href="@{/employee/list}" class="btn btn-outline-secondary btn-pro">Back</a>
                    <button type="submit" class="btn btn-success btn-pro">Save Employee</button>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
